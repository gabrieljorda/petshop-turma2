<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login -  Pet & Cia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="login-page">

        <section class="lado-esquerdo">

    <div class="logo-area">
    <img src="./img/logo.png" alt="Logo Pet & Cia">
</div>

    <h1>Cuidado premium para quem você ama</h1>

    <p>
        Acesse sua conta para acompanhar pedidos, produtos, serviços e tudo que o seu pet precisa em um só lugar
    </p>

    <div class="beneficios">
        <span>🐶 Banho e Tosa</span>
        <span>🐱 Produtos selecionados</span>
        <span>🦴 Atendimento especializado</span>
    </div>
</section>

        <section class="lado-direito">
            <form class="form-login">
                <h2>Entrar na conta</h2>
                <p class="subtitulo">Bem-vindo de volta à Pet & Cia</p>

                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail">

                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha">

                <button type="submit">Entrar</button>

                <p class="criar-conta">
                    Ainda não tem conta?
                    <a href="../cadastro/cadastro.html">Criar conta</a>
                </p>
            </form>
        </section>

    </main>

    <script src="script.js"></script>
</body>



</html>
